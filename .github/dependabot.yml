version: 2
updates:
  - package-ecosystem: npm
    directory: /template
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      patch:
        update-types: [patch]
      minor:
        update-types: [minor]
    commit-message:
      prefix: chore
      include: scope

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    commit-message:
      prefix: chore
      include: scope
