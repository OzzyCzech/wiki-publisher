name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '25'
          cache: npm
          cache-dependency-path: template/package-lock.json
      - name: Install
        working-directory: template
        run: npm ci
      - name: Build
        working-directory: template
        run: npm run build
