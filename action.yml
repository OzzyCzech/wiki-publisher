name: Starlight
description: Build a Starlight site from a markdown content repo and upload it as a GitHub Pages artifact
inputs:
  content-path:
    description: Path inside the caller repo where content lives
    required: false
    default: '.'
  node-version:
    description: Node.js version to use for the build
    required: false
    default: '24'
runs:
  using: composite
  steps:
    - name: Setup Node
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}

    - name: Assemble build directory
      shell: bash
      env:
        ACTION_PATH: ${{ github.action_path }}
        CONTENT_DIR: ${{ github.workspace }}/${{ inputs.content-path }}
      run: |
        set -euo pipefail
        WORK="$RUNNER_TEMP/starlight-build"
        rm -rf "$WORK"
        mkdir -p "$WORK"

        # 1. Copy template skeleton (astro config, package.json, src/pages, src/markdown, src/content.config.ts, public/, ...)
        rsync -a "$ACTION_PATH/template/" "$WORK/"

        # 2. Overlay caller-provided files (caller wins on collisions):
        #    - src/      -> $WORK/src/         (components, assets, style.css, ...)
        #    - public/   -> $WORK/public/
        #    - starlight.config.mjs -> $WORK/src/starlight.config.mjs
        #    - astro.config.mjs     -> $WORK/astro.config.mjs (full override; rare)
        if [ -d "$CONTENT_DIR/src" ];    then rsync -a "$CONTENT_DIR/src/"    "$WORK/src/";    fi
        if [ -d "$CONTENT_DIR/public" ]; then rsync -a "$CONTENT_DIR/public/" "$WORK/public/"; fi
        if [ -f "$CONTENT_DIR/starlight.config.mjs" ]; then cp "$CONTENT_DIR/starlight.config.mjs" "$WORK/src/starlight.config.mjs"; fi
        if [ -f "$CONTENT_DIR/astro.config.mjs" ];     then cp "$CONTENT_DIR/astro.config.mjs"     "$WORK/astro.config.mjs";         fi

        if [ ! -f "$WORK/src/starlight.config.mjs" ]; then
          echo "::error::starlight.config.mjs not found at $CONTENT_DIR/starlight.config.mjs"
          exit 1
        fi

        # 3. Sync remaining caller files (markdown content) into src/content/docs/
        rsync -a \
          --exclude='.git' \
          --exclude='.github' \
          --exclude='.claude' \
          --exclude='.gitignore' \
          --exclude='.DS_Store' \
          --exclude='.astro' \
          --exclude='node_modules' \
          --exclude='dist' \
          --exclude='CLAUDE.md' \
          --exclude='readme.md' \
          --exclude='README.md' \
          --exclude='LICENSE' \
          --exclude='package.json' \
          --exclude='package-lock.json' \
          --exclude='yarn.lock' \
          --exclude='tsconfig.json' \
          --exclude='astro.config.mjs' \
          --exclude='starlight.config.mjs' \
          --exclude='src' \
          --exclude='public' \
          "$CONTENT_DIR/" "$WORK/src/content/docs/"

        echo "STARLIGHT_WORK=$WORK" >> "$GITHUB_ENV"

    - name: Install dependencies
      shell: bash
      working-directory: ${{ env.STARLIGHT_WORK }}
      run: npm ci

    - name: Build site
      shell: bash
      working-directory: ${{ env.STARLIGHT_WORK }}
      run: npm run build

    - name: Upload Pages artifact
      uses: actions/upload-pages-artifact@v4
      with:
        path: ${{ env.STARLIGHT_WORK }}/dist
