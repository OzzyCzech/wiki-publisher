name: Starlight
description: Build an Astro Starlight site from a Markdown repo and upload it as a GitHub Pages artifact. Zero config required.
author: OzzyCzech
branding:
  icon: book-open
  color: purple
inputs:
  content-path:
    description: Path inside the caller repo where content lives
    required: false
    default: '.'
  node-version:
    description: Node.js version to use for the build
    required: false
    default: '25'
  starlight-version:
    description: Override @astrojs/starlight version (e.g. '0.40.1' or '^0.40.0'). Leave empty to use the version pinned in template/package.json.
    required: false
  astro-version:
    description: Override astro version (e.g. '^6.3.0'). Leave empty to use the version pinned in template/package.json.
    required: false
  base:
    description: |
      Astro `base` path (e.g. '/my-repo' for project pages on github.io).
      Leave empty for sites at the root of a custom domain.
    required: false
runs:
  using: composite
  steps:
    - name: Setup Node
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}

    - name: Assemble build directory
      shell: bash
      env:
        ACTION_PATH: ${{ github.action_path }}
        CONTENT_DIR: ${{ github.workspace }}/${{ inputs.content-path }}
      run: |
        set -euo pipefail
        WORK="$RUNNER_TEMP/starlight-build"
        rm -rf "$WORK"
        mkdir -p "$WORK"

        # 1. Copy template skeleton (astro config, package.json, src/pages, src/markdown, src/content.config.ts, public/, ...)
        rsync -a "$ACTION_PATH/template/" "$WORK/"

        # 2. Overlay caller-provided files (caller wins on collisions):
        #    - src/      -> $WORK/src/         (components, assets, style.css, ...)
        #    - public/   -> $WORK/public/
        #    - starlight.config.mjs -> $WORK/src/starlight.config.mjs
        #    - astro.config.mjs     -> $WORK/astro.config.mjs (full override; rare)
        if [ -d "$CONTENT_DIR/src" ];    then rsync -a "$CONTENT_DIR/src/"    "$WORK/src/";    fi
        if [ -d "$CONTENT_DIR/public" ]; then rsync -a "$CONTENT_DIR/public/" "$WORK/public/"; fi
        if [ -f "$CONTENT_DIR/starlight.config.mjs" ]; then
          cp "$CONTENT_DIR/starlight.config.mjs" "$WORK/src/starlight.config.mjs"
        else
          # Caller has no config — derive a default title from the repo name so
          # the rendered site doesn't say "Site" at the top.
          DEFAULT_TITLE="${GITHUB_REPOSITORY##*/}"
          echo "STARLIGHT_DEFAULT_TITLE=$DEFAULT_TITLE" >> "$GITHUB_ENV"
          echo "::notice::No starlight.config.mjs found; using template default (title=$DEFAULT_TITLE, autogenerated sidebar)"
        fi

        if [ -f "$CONTENT_DIR/astro.config.mjs" ]; then cp "$CONTENT_DIR/astro.config.mjs" "$WORK/astro.config.mjs"; fi

        # 3. Sync remaining caller files (markdown content) into src/content/docs/
        rsync -a \
          --exclude='.git' \
          --exclude='.github' \
          --exclude='.claude' \
          --exclude='.gitignore' \
          --exclude='.DS_Store' \
          --exclude='.astro' \
          --exclude='node_modules' \
          --exclude='dist' \
          --exclude='CLAUDE.md' \
          --exclude='[Rr][Ee][Aa][Dd][Mm][Ee].md' \
          --exclude='[Rr][Ee][Aa][Dd][Mm][Ee].mdx' \
          --exclude='LICENSE' \
          --exclude='package.json' \
          --exclude='package-lock.json' \
          --exclude='yarn.lock' \
          --exclude='tsconfig.json' \
          --exclude='astro.config.mjs' \
          --exclude='starlight.config.mjs' \
          --exclude='src' \
          --exclude='public' \
          "$CONTENT_DIR/" "$WORK/src/content/docs/"

        # 4. Homepage fallback order: caller's index.{md,mdx} (already rsynced)
        #    > caller's README.{md,mdx} (case-insensitive) > template's default index.md.
        if [ ! -f "$CONTENT_DIR/index.md" ] && [ ! -f "$CONTENT_DIR/index.mdx" ]; then
          README=""
          for f in "$CONTENT_DIR"/[Rr][Ee][Aa][Dd][Mm][Ee].md "$CONTENT_DIR"/[Rr][Ee][Aa][Dd][Mm][Ee].mdx; do
            if [ -f "$f" ]; then README="$f"; break; fi
          done
          if [ -n "$README" ]; then
            ext="${README##*.}"
            rm -f "$WORK/src/content/docs/index.md" "$WORK/src/content/docs/index.mdx"
            DEST="$WORK/src/content/docs/index.${ext}"
            if head -1 "$README" | grep -q '^---$'; then
              cp "$README" "$DEST"
            else
              TITLE=$(grep -m1 '^# ' "$README" | sed 's/^# *//' || true)
              TITLE=${TITLE:-Home}
              {
                echo '---'
                printf 'title: %s\n' "$(printf '%s' "$TITLE" | sed 's/"/\\"/g; s/^/"/; s/$/"/')"
                echo '---'
                echo ''
                # strip the first H1 since Starlight renders the frontmatter title as h1
                awk 'BEGIN{stripped=0} /^# / && !stripped { stripped=1; next } { print }' "$README"
              } > "$DEST"
            fi
            echo "::notice::No index.md found; using $(basename "$README") as homepage"
          fi
        fi

        echo "STARLIGHT_WORK=$WORK" >> "$GITHUB_ENV"

    - name: Install dependencies
      shell: bash
      working-directory: ${{ env.STARLIGHT_WORK }}
      env:
        STARLIGHT_VERSION: ${{ inputs.starlight-version }}
        ASTRO_VERSION: ${{ inputs.astro-version }}
      run: |
        if [ -n "$STARLIGHT_VERSION" ] || [ -n "$ASTRO_VERSION" ]; then
          [ -n "$STARLIGHT_VERSION" ] && npm pkg set "dependencies.@astrojs/starlight=$STARLIGHT_VERSION"
          [ -n "$ASTRO_VERSION" ]     && npm pkg set "dependencies.astro=$ASTRO_VERSION"
          npm install --no-audit --no-fund
        else
          npm ci
        fi

    - name: Build site
      shell: bash
      working-directory: ${{ env.STARLIGHT_WORK }}
      env:
        STARLIGHT_BASE: ${{ inputs.base }}
      run: npm run build

    - name: Upload Pages artifact
      uses: actions/upload-pages-artifact@v5
      with:
        path: ${{ env.STARLIGHT_WORK }}/dist
